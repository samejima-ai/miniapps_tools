# issue-pickup — Issue → AI 実装 → PR 作成 (autonomous-drive 入口側)
#
# v5.7.0 で新設、v5.7.1 で実装エージェントを Claude Code CLI に切替。
# dialog-harness の crosscut-issue-implementer skill 実装。
# Issue label `ready-for-ai` 付与で発火、3 段階フィルター + AI triage で選別、
# pickup 確定なら Claude Code CLI が実装、PR 作成、`auto-merge` label 自動付与で
# 既存 gemini-review.yml + auto-merge.yml に引き継ぐ。
#
# 詳細は .claude/skills/crosscut-issue-implementer/SKILL.md 参照。
#
# v5.7.1 改訂点:
# - 実装エージェント: gemini-cli → Claude Code CLI (anthropics/claude-code-action@v0)
# - 認証: CLAUDE_CODE_OAUTH_TOKEN（Anthropic Pro/Max サブスクリプション、追加 API 課金なし）
# - AI triage は gemini-cli メイン継続（軽量、無料 tier、異質モデル併走）
# - 失敗時のフォールバックは自動化しない（人間 P4 判断、`pickup-failed` label 付与）
#
# 注意: 本 workflow は autonomous_scope: full 専用。
#   prompt 内の `--label auto-merge` も full 専用前提。
#   merge_gated / custom スコープで利用する場合は SKILL.md「CTL との関係」表に従い
#   `--label auto-merge` を取り除いた派生 workflow を別途用意すること（auto-merge 自動付与は merge_gated では禁止）。
#   crosscut-issue-implementer/SKILL.md 「発動条件」も `autonomous_scope: full` のみ active 化と明記。

name: issue-pickup

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write  # v5.7.2 fix: anthropics/claude-code-action@v0 の OIDC token 取得に必須

# 同 Issue の並行実行を排他（多重起動防止）
concurrency:
  group: "issue-pickup-${{ github.event.issue.number }}"
  cancel-in-progress: false

env:
  # Issue picking up を信頼する author allowlist (space 区切り)
  ALLOWED_AUTHORS: "samejima-ai"
  # Circuit Breaker: 日次/月次上限
  DAILY_LIMIT: "5"
  MONTHLY_LIMIT: "50"

jobs:
  pickup:
    # label `ready-for-ai` 付与時のみ、bot を除外
    if: |
      github.event.label.name == 'ready-for-ai' &&
      github.event.issue.user.login != 'dependabot[bot]' &&
      github.event.issue.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ secrets.GH_REVIEW_PAT }}
      GH_REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    steps:
      - name: Pre-check secrets availability
        id: check_secrets
        env:
          CLAUDE_CODE_OAUTH_TOKEN_PROBE: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GEMINI_API_KEY_PROBE: ${{ secrets.GEMINI_API_KEY }}
          GH_REVIEW_PAT_PROBE: ${{ secrets.GH_REVIEW_PAT }}
        run: |
          MISSING=()
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN_PROBE" ]; then
            MISSING+=("CLAUDE_CODE_OAUTH_TOKEN")
          fi
          if [ -z "$GEMINI_API_KEY_PROBE" ]; then
            MISSING+=("GEMINI_API_KEY")
          fi
          if [ -z "$GH_REVIEW_PAT_PROBE" ]; then
            MISSING+=("GH_REVIEW_PAT")
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::notice::Required secrets not set: ${MISSING[*]}. Skipping pickup. See .claude/skills/crosscut-issue-implementer/references/setup-checklist.md"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check_secrets.outputs.available == 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ secrets.GH_REVIEW_PAT }}

      - name: Filter — label `do-not-pickup` block
        if: steps.check_secrets.outputs.available == 'true'
        id: do_not_pickup_check
        run: |
          set -euo pipefail
          LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '.labels[].name' | tr '\n' ',')
          if echo ",$LABELS," | grep -q ",do-not-pickup,"; then
            echo "::notice::Issue #$ISSUE_NUMBER has 'do-not-pickup' label. Block."
            echo "blocked=true" >> "$GITHUB_OUTPUT"
          else
            echo "blocked=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Circuit Breaker check
        if: steps.check_secrets.outputs.available == 'true' && steps.do_not_pickup_check.outputs.blocked != 'true'
        id: circuit_breaker
        run: |
          set -euo pipefail
          STATS_FILE=".gemini/issue-pickup-stats.json"
          mkdir -p .gemini
          if [ ! -f "$STATS_FILE" ]; then
            echo '{"version":"v5.7.1","issues":[]}' > "$STATS_FILE"
          fi
          TODAY=$(date -u +%Y-%m-%d)
          MONTH=$(date -u +%Y-%m)
          TODAY_COUNT=$(jq --arg d "$TODAY" '[.issues[]? | select(.pickup_at | startswith($d))] | length' "$STATS_FILE")
          MONTH_COUNT=$(jq --arg m "$MONTH" '[.issues[]? | select(.pickup_at | startswith($m))] | length' "$STATS_FILE")
          if [ "$TODAY_COUNT" -ge "$DAILY_LIMIT" ]; then
            echo "::warning::Daily Circuit Breaker triggered ($TODAY_COUNT/$DAILY_LIMIT)"
            gh issue edit "$ISSUE_NUMBER" --add-label "circuit-broken" || true
            echo "broken=true" >> "$GITHUB_OUTPUT"
          elif [ "$MONTH_COUNT" -ge "$MONTHLY_LIMIT" ]; then
            echo "::warning::Monthly Circuit Breaker triggered ($MONTH_COUNT/$MONTHLY_LIMIT)"
            gh issue edit "$ISSUE_NUMBER" --add-label "circuit-broken" || true
            echo "broken=true" >> "$GITHUB_OUTPUT"
          else
            echo "broken=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Filter — author allowlist
        if: |
          steps.check_secrets.outputs.available == 'true' &&
          steps.do_not_pickup_check.outputs.blocked != 'true' &&
          steps.circuit_breaker.outputs.broken != 'true'
        id: author_check
        run: |
          set -euo pipefail
          AUTHOR=$(gh issue view "$ISSUE_NUMBER" --json author --jq '.author.login')
          if ! echo " $ALLOWED_AUTHORS " | grep -q " $AUTHOR "; then
            echo "::notice::Author '$AUTHOR' not in ALLOWED_AUTHORS. Skip."
            gh issue edit "$ISSUE_NUMBER" --add-label "untrusted-author" || true
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Filter — body required sections (type-aware, v5.10.0)
        if: |
          steps.check_secrets.outputs.available == 'true' &&
          steps.do_not_pickup_check.outputs.blocked != 'true' &&
          steps.circuit_breaker.outputs.broken != 'true' &&
          steps.author_check.outputs.passed == 'true'
        id: body_check
        run: |
          set -euo pipefail
          BODY=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
          LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '.labels[].name' | tr '\n' ',')
          MISSING=()
          # v5.10.0: discussion ラベル有無で必須セクションを分岐
          # - discussion ラベルあり: L0 spec-architect 起票 (P3/P4 由来) → L0 対話記録 + 実装スコープ
          # - discussion ラベルなし: bug-style 起票 (P1/P2 由来) → 再現手順 + 期待動作 + 受入条件
          # 詳細: .claude/skills/crosscut-issue-implementer/SKILL.md §Issue 本文必須セクション規格
          if echo ",$LABELS," | grep -q ",discussion,"; then
            ISSUE_TYPE="discussion-style"
            # L0 spec-architect 対話記録（実装の根拠 = 確定軸）
            if ! echo "$BODY" | grep -qE "^## L0 spec-architect 対話記録"; then
              MISSING+=("L0 spec-architect 対話記録")
            fi
            # 実装スコープ（実装の対象 = 変更ファイル + バージョン）
            if ! echo "$BODY" | grep -qE "^## 実装スコープ"; then
              MISSING+=("実装スコープ")
            fi
          else
            ISSUE_TYPE="bug-style"
            # 再現手順 / Steps to reproduce
            if ! echo "$BODY" | grep -qE "^## (再現手順|Steps to reproduce)"; then
              MISSING+=("再現手順 / Steps to reproduce")
            fi
            # 期待動作 / Expected behavior
            if ! echo "$BODY" | grep -qE "^## (期待動作|Expected behavior)"; then
              MISSING+=("期待動作 / Expected behavior")
            fi
            # 受入条件 / Acceptance criteria
            if ! echo "$BODY" | grep -qE "^## (受入条件|Acceptance criteria)"; then
              MISSING+=("受入条件 / Acceptance criteria")
            fi
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::notice::Body missing required sections (type=$ISSUE_TYPE): ${MISSING[*]}"
            gh issue edit "$ISSUE_NUMBER" --add-label "needs-clarification" || true
            gh issue comment "$ISSUE_NUMBER" --body "本 Issue (type=${ISSUE_TYPE}) は自動 pickup の本文必須項目を満たしていません。以下のセクションを追加してください: ${MISSING[*]}" || true
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Body check passed (type=$ISSUE_TYPE)"
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: AI Triage (gemini-cli, v5.7.1 では引き続き MVP placeholder)
        if: |
          steps.check_secrets.outputs.available == 'true' &&
          steps.do_not_pickup_check.outputs.blocked != 'true' &&
          steps.circuit_breaker.outputs.broken != 'true' &&
          steps.author_check.outputs.passed == 'true' &&
          steps.body_check.outputs.passed == 'true'
        id: triage
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -uo pipefail
          # v5.7.1: triage は gemini-cli メイン継続（軽量、無料 tier、異質モデル併走）
          # 現状は v5.7.0 から引き継ぎの MVP placeholder。フル実装は後続の v5.7.x で対応
          # 詳細プロトコル: .claude/skills/crosscut-issue-implementer/references/triage-protocol.md
          echo "::notice::AI Triage (gemini-cli, MVP placeholder): pickup_yes と仮定して進行"
          echo "verdict=pickup_yes" >> "$GITHUB_OUTPUT"

      - name: Pickup confirmation + label `in-progress`
        if: steps.triage.outputs.verdict == 'pickup_yes'
        run: |
          set -euo pipefail
          gh issue edit "$ISSUE_NUMBER" --add-label "in-progress" || true
          gh issue comment "$ISSUE_NUMBER" --body "Issue pickup を開始しました（v5.7.1 issue-pickup workflow）。実装エージェント: **Claude Code CLI** (anthropics/claude-code-action + Anthropic Pro/Max サブスクリプション)。" || true

      - name: Implementation (Claude Code CLI)
        if: steps.triage.outputs.verdict == 'pickup_yes'
        id: claude_impl
        continue-on-error: true
        uses: anthropics/claude-code-action@v0
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          timeout_minutes: "30"
          direct_prompt: |
            あなたは dialog-harness の autonomous-drive L1 実装者です。
            GitHub Issue #${{ env.ISSUE_NUMBER }} の実装を行ってください。

            ## 前提
            - dev_mode: autonomous + autonomous_scope: full
            - layer1-autonomous-dev skill のフローに従う（SPEC.md / DONT.md / REGIME.md / sensors/ 読み込み + 実装 + 自己検証 + commit + PR）
            - 開発中に人間に質問しない（自走して献上、philosophy.md 第 7 条「AI 組織論」P1〜P4）
            - DONT.md の領域に踏み込まない

            ## 手順
            1. 作業 branch を作成: `feat/issue-${{ env.ISSUE_NUMBER }}-<slug>`（master / main から分岐）
            2. SPEC.md / DONT.md / REGIME.md を読み込み、実装方針を確認
            3. Issue 本文の「再現手順」「期待動作」「受入条件」を満たす実装
            4. 自己検証（sensors/ に従い、計算的 + 推論的）
            5. commit + push（ブランチ名と一致）
            6. PR 作成: `gh pr create --title <descriptive title> --body <Closes #${{ env.ISSUE_NUMBER }} 含む詳細>`（v5.9.0 で `--label auto-merge` 削除、opt-out モデルでデフォルト auto-merge 走行）
            7. PR description に必ず `Closes #${{ env.ISSUE_NUMBER }}` を含める
            8. opt-in 領域（`.claude/skills/crosscut-autonomous-drive/references/auto-merge-boundary.md` §opt-in 領域）に該当する変更を含む場合は `--label human-review-needed` を付与（auto-merge を停止して人間レビュー待ち）

            ## 失敗時
            自力修正上限（同一エラー 3 回）を超えた場合は、Issue にコメントで報告し、`pickup-failed` label 付与の判断を行うこと（`pickup-failed` は stop ラベルとして auto-merge を skip する）。

      # v5.10.0 (Issue #51 軸 A): Create PR fallback
      # claude-code-action@v0 が direct_prompt の `gh pr create` 指示を default で skip する
      # 構造的穴に対する workflow 側フォールバック。claude_impl success 後に branch を git で検出し、
      # PR が存在しなければ自動作成する。
      # 軸 B: ブランチ検出は `git branch -r` パターンマッチ
      # 軸 C: 重複防止は `gh pr list --head` チェック
      - name: Create PR (fallback if claude-code-action skipped, v5.10.0)
        if: |
          steps.triage.outputs.verdict == 'pickup_yes' &&
          steps.claude_impl.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_REVIEW_PAT }}
        run: |
          set -euo pipefail
          # ブランチ検出: feat/issue-N-* または claude/issue-N* パターン
          git fetch origin
          BRANCH=$(git branch -r | grep -E "origin/(feat|claude)/issue-${ISSUE_NUMBER}[-/]?" | head -1 | sed 's|.*origin/||' | tr -d ' ')
          if [ -z "$BRANCH" ]; then
            echo "::warning::No branch found for Issue #${ISSUE_NUMBER}. claude-code-action did not create a branch (or used unexpected naming)."
            exit 0
          fi
          echo "::notice::Detected branch: $BRANCH"
          # 重複防止: 既存 PR チェック
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // ""')
          if [ -n "$EXISTING" ]; then
            echo "::notice::PR #${EXISTING} already exists for branch ${BRANCH}. Skip fallback."
            exit 0
          fi
          # PR 作成
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')
          PR_BODY=$(printf 'Closes #%s\n\nThis PR was auto-created by issue-pickup.yml fallback step (v5.10.0, Issue #51) because claude-code-action@v0 skipped `gh pr create` despite direct_prompt instruction.\n\nThe implementation was completed by autonomous-drive Claude Code CLI on branch `%s`. Please review the diff and add the `human-review-needed` label if this PR touches opt-in territory (see `auto-merge-boundary.md`).\n\nAuto-created via fallback step. Review the implementation, then approve or request changes.' "$ISSUE_NUMBER" "$BRANCH")
          gh pr create --base master --head "$BRANCH" --title "feat: $ISSUE_TITLE" --body "$PR_BODY"
          echo "::notice::PR created for branch $BRANCH closing Issue #${ISSUE_NUMBER}"

      - name: Handle Claude Code failure
        if: |
          steps.triage.outputs.verdict == 'pickup_yes' &&
          steps.claude_impl.outcome == 'failure'
        run: |
          set -uo pipefail
          gh issue edit "$ISSUE_NUMBER" --add-label "pickup-failed" || true
          gh issue edit "$ISSUE_NUMBER" --remove-label "in-progress" || true
          gh issue comment "$ISSUE_NUMBER" --body "Claude Code CLI による実装が失敗しました。**自動フォールバックは行いません**（人間 P4 判断、philosophy.md 第 4 条「人間が判断する場面」+ 第 7 条 AI 組織論 P4「暴走時介入」）。

          選択肢:
          - gemini-cli で再 trigger する（手動運用、v5.7.x で workflow 化予定）
          - \`do-not-pickup\` label で block する
          - Issue 本文を更新して \`ready-for-ai\` を再付与する（再 pickup）

          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true

      - name: Update statistics
        if: |
          steps.check_secrets.outputs.available == 'true' && always()
        run: |
          set -uo pipefail
          STATS_FILE=".gemini/issue-pickup-stats.json"
          if [ ! -f "$STATS_FILE" ]; then
            mkdir -p .gemini
            echo '{"version":"v5.7.1","issues":[]}' > "$STATS_FILE"
          fi
          # append-only 統計記録（merge 時は別 commit で更新を推奨、本 workflow では artifact upload で観測）
          echo "::notice::Stats record: artifact upload で観測可能化（v5.7.x で commit 自動化を検討）"

      - name: Upload pickup-stats artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-pickup-stats-${{ github.event.issue.number }}-run-${{ github.run_id }}
          path: |
            .gemini/
          if-no-files-found: warn
          retention-days: 7
